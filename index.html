<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AutonoLearn RL — Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Squada+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>

<body>
    <div id="app-wrapper">
        <!-- Izquierda: Juego -->
        <div id="game-container">
            <div id="mode-selector" style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center;">
                <label for="agent-select" style="color: white; font-family: 'Squada One', sans-serif;">Mode:</label>
                <select id="agent-select" style="padding: 5px; border-radius: 5px; font-family: sans-serif;">
                    <option value="human">Human (Manual)</option>
                    <option value="qlearning">Q-Learning Agent (Baseline)</option>
                    <option value="dqn">DQN Agent (Neural Net)</option>
                    <option value="benchmark">Comparar Modelos Locales (Benchmark)</option>
                </select>
            </div>
            <canvas id="canvas" width="276" height="414"></canvas>
            <div id="speed-controls">
                <span class="speed-label">Speed:</span>
                <button class="speed-btn active" data-speed="1">1×</button>
                <button class="speed-btn" data-speed="4">4×</button>
                <button class="speed-btn" data-speed="16">16×</button>
                <button class="speed-btn" data-speed="75">75×</button>
                <button class="speed-btn" data-speed="100">100×</button>
                <button class="speed-btn" data-speed="1000">1000×</button>
            </div>
        </div>

        <!-- Derecha: Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="dash-cards">
                <div class="card">
                    <span class="card-title">Episode</span>
                    <span id="lb-episode" class="card-value">0</span>
                </div>
                <div class="card">
                    <span class="card-title">Current ε</span>
                    <span id="lb-epsilon" class="card-value">1.000</span>
                </div>
                <div class="card">
                    <span class="card-title">Max Score</span>
                    <span id="lb-maxscore" class="card-value">0</span>
                </div>
                <div class="card">
                    <span class="card-title">States</span>
                    <span id="lb-states" class="card-value">0</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="chart-reward"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="chart-score"></canvas>
            </div>
        </div>
        <!-- Benchmark UI (Hidden by default) -->
        <div id="benchmark-dashboard" class="hidden">
            <h2>Evaluación Comparativa de Agentes</h2>
            <p>Se cargarán los agentes guardados en /models/ y se someterán a 200 episodios idénticos para probar asintónticamente quién gana.</p>
            
            <div id="benchmark-progress" style="margin-top: 15px;">
                <h3 id="bm-agent-name">Esperando inicio...</h3>
                <div style="width: 100%; background: #2d2d44; border-radius: 5px; overflow: hidden; height: 20px; border: 1px solid #3d3d5c;">
                    <div id="bm-progress-bar" style="width: 0%; height: 100%; background: #4f46e5; transition: width 0.1s;"></div>
                </div>
                <p id="bm-stats" style="color: #9ca3af; font-family: 'Squada One'; margin-top: 5px;">Avg: 0 | Max: 0</p>
            </div>

            <div id="benchmark-results" style="margin-top: 20px;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; color: white;">
                    <thead>
                        <tr style="border-bottom: 2px solid #3d3d5c;">
                            <th style="padding: 5px;">Agente</th>
                            <th style="padding: 5px;">Avg Score</th>
                            <th style="padding: 5px;">Max Score</th>
                            <th style="padding: 5px;">Std Dev</th>
                        </tr>
                    </thead>
                    <tbody id="bm-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
                <h3 id="bm-conclusion" style="margin-top: 15px; color: #30c0df;"></h3>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>

</html>
